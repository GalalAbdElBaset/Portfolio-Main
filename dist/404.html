<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Galal Abdelbaset</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #121212, #071026);
            color: #e6eef8;
            font-family: system-ui, -apple-system, 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 6rem;
            margin: 0;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        p {
            font-size: 1.2rem;
            margin: 20px 0;
            color: #9aa6b2;
        }
        a {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: transform 0.3s;
        }
        a:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Oops! The page you're looking for doesn't exist.</p>
        <a href="/portfolio/">← Back to Portfolio</a>
    </div>
</body>
</html>
